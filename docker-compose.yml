services:
  payback:
    build: .
    container_name: payback-coupons
    restart: unless-stopped
    volumes:
      # Persistente Daten (Cookies + Logs)
      - payback-data:/data
    environment:
      # Cronjob-Zeitplan (Standard: täglich um 8:00 Uhr)
      - CRON_SCHEDULE=0 8 * * *
      # Beim Container-Start direkt einmal ausführen? (true/false)
      - RUN_ON_START=false
      # Headless-Modus (immer true im Automatik-Betrieb)
      - HEADLESS=true
    # Ressourcen-Limits (optional aber empfohlen)
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

volumes:
  payback-data:

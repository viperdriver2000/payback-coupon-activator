services:
  payback:
    build: .
    container_name: payback-coupons
    restart: unless-stopped
    volumes:
      - payback-data:/data
    ports:
      - "6081:6081"
    environment:
      - CRON_SCHEDULE=0 8 * * *
      - RUN_ON_START=false
      - HEADLESS=true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

volumes:
  payback-data:
